<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <STYle>
        .case {
            border: 3px solid black;
            height: 100px;
            width: 50%;
            border-radius: 10px;
            text-transform: capitalize;
            text-align: center;
            padding-top: 60px;
        }

        .elemet1 {
            background-color: rgb(165, 117, 209);
            position: relative;
            top: 200px;
        }

        .element2 {
            background-color: greenyellow;
            position: absolute;
            left: 60px;
            top: 100px;
        }

        .elemet3 {
            background-color: pink;
            position: absolute;
            bottom: 200px;
            left: 140px;
        }
    </STYle>
</head>

<body>
    <div class="container">
        <div class="case elemet1">element 1</div>
        <div class="case element2">element 2</div>
        <div class="case elemet3">element 3</div>
    </div>
</body>

</html>
