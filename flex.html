<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        .case {
            border: 1px solid black;
            text-align: center;
            width: 100px;
            height: 20px;
            padding: 30px;
        }

        .ONE {
            background-color: RED;
        }

        .TWO {
            background-color: yellow;
        }

        .THREE {
            background-color: green;
        }

        .FOUR {
            background: blue;
        }

        .container {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-flow: column wrap;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="case ONE">1</div>
        <div class="case TWO">2</div>
        <div class="case THREE">3</div>
        <div class="case FOUR">4</div>
    </div>
</body>

</html>
