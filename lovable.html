<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحتي الشخصية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        /* تحسين يدوي: إضافة تأثير تدريجي ناعم للخلفية */
        .hero-bg {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="hero-bg text-white min-h-screen flex items-center justify-center">

    <!-- قسم الـ Hero -->
    <section class="text-center px-6">
        <!-- تحسين يدوي: زيادة التباعد (Tracking) وتكبير الخط -->
        <h1 class="text-5xl md:text-7xl font-bold mb-4 tracking-tight">
            [اسمي هنا]
        </h1>
        
        <p class="text-lg md:text-2xl text-slate-400 mb-10 max-w-2xl mx-auto">
            مطور واجهات أمامية وشغوف ببناء تجارب رقمية استثنائية.
        </p>

        <a href="#projects" 
           class="inline-block bg-blue-600 hover:bg-blue-500 text-white font-semibold px-8 py-4 rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg">
            View My Projects
        </a>
    </section>

</body>
</html>
